name: Evidence Gate

on:
  # Security boundary: this workflow is loaded from the trusted base, never the PR.
  pull_request_target:
    types: [opened, synchronize, edited, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: evidence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  evidence:
    name: Evidence Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout trusted validator
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: trusted-gate
          persist-credentials: false

      - name: Validate evidence schema
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: printf '%s' "$PR_BODY" | python3 trusted-gate/.github/scripts/validate_evidence.py
